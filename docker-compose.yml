services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hlp
      POSTGRES_PASSWORD: hlp_dev
      POSTGRES_DB: hlp_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hlp -d hlp_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
