name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hlp
          POSTGRES_PASSWORD: hlp_dev
          POSTGRES_DB: hlp_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U hlp -d hlp_dev"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/hlp/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
        env:
          DATABASE_URL: postgresql://hlp:hlp_dev@localhost:5432/hlp_dev
          SECRET_KEY: test-secret-key

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql://hlp:hlp_dev@localhost:5432/hlp_dev
          SECRET_KEY: test-secret-key

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
        if: hashFiles('frontend/package-lock.json') != ''

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        if: hashFiles('frontend/package.json') != ''
